  faq:
    title: "FAQ - DocPack"
    heading: "よくある質問"
    items:
      - q: "DocPackは無料ですか？"
        a: "はい、完全無料です。登録なしですぐにご利用いただけます。"
      - q: "圧縮すると画質は落ちますか？"
        a: "できる限り画質を保ちながら2MB以下に圧縮します。見た目ではほとんど違いがわかりません。"
      - q: "一度に何ファイルまでアップロードできますか？"
        a: "一度に最大20ファイルまでアップロードできます。1ファイルあたり最大10MBです。"
      - q: "アップロードしたファイルはサーバーに保存されますか？"
        a: "処理後に自動で削除されます。プライバシーの心配なくご利用いただけます。"
      - q: "どのファイル形式に対応していますか？"
        a: "JPG, PNG, HEIC, WebPなど主要な画像形式にすべて対応しています。"
      - q: "SNSリサイズはどのサイズに対応していますか？"
        a: "Instagram 1:1 (1080x1080)、4:5 (1080x1350)、Facebook 1.91:1 (1200x630)、9:16 (1080x1920) に対応しています。"
