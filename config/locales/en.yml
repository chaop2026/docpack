  faq:
    title: "FAQ - DocPack"
    heading: "Frequently Asked Questions"
    items:
      - q: "Is DocPack free?"
        a: "Yes, completely free. You can use it right away without signing up."
      - q: "Does image quality drop after compression?"
        a: "We compress to under 2MB while preserving quality as much as possible. The difference is barely noticeable."
      - q: "How many files can I upload at once?"
        a: "You can upload up to 20 files at once. Each file can be up to 10MB."
      - q: "Are uploaded files stored on the server?"
        a: "Files are automatically deleted after processing. Use it without privacy concerns."
      - q: "What file formats are supported?"
        a: "All major image formats including JPG, PNG, HEIC, and WebP."
      - q: "What social media dimensions are supported?"
        a: "Instagram 1:1 (1080x1080), 4:5 (1080x1350), Facebook 1.91:1 (1200x630), and 9:16 (1080x1920)."
