    home_description: "DocPack: compresión de imágenes, conversión a PDF y redimensionado para redes gratis. Rápido, seguro y sin registro."
    compress_description: "Comprime imágenes JPG, PNG y WebP a menos de 2 MB manteniendo la calidad. Compresor de imágenes online gratuito."
    pdf_description: "Convierte varias imágenes en un solo archivo PDF de menos de 2 MB. Conversor de imágenes a PDF online gratuito."
