  faq:
    title: "Preguntas frecuentes - DocPack"
    heading: "Preguntas frecuentes"
    items:
      - q: "¿DocPack es gratis?"
        a: "Sí, totalmente gratis. Puedes usarlo enseguida sin registrarte."
      - q: "¿Baja la calidad de la imagen tras comprimir?"
        a: "Comprimimos a menos de 2 MB conservando la calidad al máximo. La diferencia apenas se nota."
      - q: "¿Cuántos archivos puedo subir a la vez?"
        a: "Puedes subir hasta 20 archivos a la vez. Cada archivo puede pesar hasta 10 MB."
      - q: "¿Los archivos subidos se guardan en el servidor?"
        a: "Los archivos se eliminan automáticamente tras procesarse. Úsalo sin preocuparte por tu privacidad."
      - q: "¿Qué formatos de archivo son compatibles?"
        a: "Todos los formatos de imagen principales, como JPG, PNG, HEIC y WebP."
      - q: "¿Qué dimensiones de redes sociales admite?"
        a: "Instagram 1:1 (1080x1080), 4:5 (1080x1350), Facebook 1.91:1 (1200x630) y 9:16 (1080x1920)."
