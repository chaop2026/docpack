    faq_description: "DocPack 자주 묻는 질문 — 이미지 압축, PDF 변환, 소셜 미디어 리사이즈에 대한 FAQ."
  faq:
    title: "FAQ - DocPack"
    heading: "자주 묻는 질문"
    items:
      - q: "DocPack은 무료인가요?"
        a: "네, 완전 무료입니다. 회원가입 없이 바로 사용할 수 있어요."
      - q: "이미지 압축 후 화질이 떨어지나요?"
        a: "최대한 화질을 유지하면서 2MB 이하로 압축합니다. 육안으로 거의 차이가 없어요."
      - q: "한 번에 몇 개 파일을 올릴 수 있나요?"
        a: "최대 20개 파일을 한 번에 올릴 수 있습니다. 파일당 최대 10MB까지 지원합니다."
      - q: "업로드한 파일은 서버에 저장되나요?"
        a: "처리 후 자동으로 삭제됩니다. 개인정보 걱정 없이 사용하세요."
      - q: "어떤 파일 형식을 지원하나요?"
        a: "JPG, PNG, HEIC, WebP 등 주요 이미지 형식을 모두 지원합니다."
      - q: "SNS 리사이즈는 어떤 규격을 지원하나요?"
        a: "인스타그램 1:1 (1080x1080), 4:5 (1080x1350) / 페이스북 1.91:1 (1200x630), 9:16 (1080x1920) 규격을 지원합니다."
